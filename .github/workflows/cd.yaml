# Note: additional setup is required, see https://www.jenkins.io/redirect/continuous-delivery-of-plugins
#
# Release is label-driven: a release is cut only when a merged PR carries a
# release-worthy label (e.g. `enhancement`, `bug`, `developer`; see the Jenkins
# org release-drafter config). A successful CI build (check_run) then triggers
# maven-cd, which computes the next version from those labels. Builds without
# such a label are a no-op. `workflow_dispatch` allows a manual run / dry run.

name: cd
on:
  workflow_dispatch:
    inputs:
      validate_only:
        required: false
        type: boolean
        description: |
          Run validation with release drafter only
          -> Skip the release job
        default: false
  check_run:
    types:
      - completed

permissions:
  checks: read
  contents: write

jobs:
  maven-cd:
    uses: jenkins-infra/github-reusable-workflows/.github/workflows/maven-cd.yml@v1
    with:
      validate_only: ${{ inputs.validate_only == true }}
    secrets:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}
